[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=Xvfb :99 -screen 0 1920x1080x24
autorestart=true
priority=10

[program:openbox]
command=openbox
environment=DISPLAY=":99"
autorestart=true
priority=20

[program:x11vnc]
command=x11vnc -display :99 -forever -nopw -shared -rfbport 5900
autorestart=true
priority=30

[program:novnc]
command=websockify --web /usr/share/novnc 6080 localhost:5900
autorestart=true
priority=40

[program:agent-api]
command=node /opt/agent-api/server.js
autorestart=true
priority=50
environment=DISPLAY=":99"
stdout_logfile=/var/log/supervisor/agent-api.log
stderr_logfile=/var/log/supervisor/agent-api-err.log
